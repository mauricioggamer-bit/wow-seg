<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoW Seg — Warband Tracker</title>
  <link rel="stylesheet" href="css/wow.css">
  <style>
    .landing-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      background-image: 
        radial-gradient(ellipse at 50% 30%, rgba(201, 168, 76, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 80%, rgba(0, 0, 0, 0.5) 0%, transparent 50%);
    }

    .landing-logo {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201, 168, 76, 0.3), 0 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .landing-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .landing-stats {
      display: flex;
      gap: 32px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .landing-stat {
      text-align: center;
    }

    .landing-stat-value {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
    }

    .landing-stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .landing-prompt {
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: default;
      user-select: none;
      padding: 20px 40px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .landing-prompt:hover {
      border-color: var(--border-gold);
      color: var(--text-secondary);
    }

    .landing-footer {
      margin-top: 60px;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="landing-container">
    <div class="landing-logo">WoW Seg</div>
    <div class="landing-subtitle">Warband Tracker</div>

    <div class="landing-stats" id="landingStats">
      <div class="landing-stat">
        <div class="landing-stat-value">44</div>
        <div class="landing-stat-label">Personajes</div>
      </div>
      <div class="landing-stat">
        <div class="landing-stat-value">9</div>
        <div class="landing-stat-label">Warbands</div>
      </div>
      <div class="landing-stat">
        <div class="landing-stat-value">27</div>
        <div class="landing-stat-label">Activos</div>
      </div>
    </div>

    <div class="landing-prompt" id="loginTrigger">
      <span style="font-size:1.2rem">🐉</span>
      <p style="margin-top:8px;font-style:italic">"Haz doble clic para entrar..."</p>
    </div>

    <div class="landing-footer">v1.0 — gusfraba + día</div>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-content" style="position:relative">
      <div class="modal-header">
        <h3>🔐 Acceso</h3>
        <button class="modal-close" onclick="document.getElementById('authModal').classList.remove('open')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="passwordInput" placeholder="Contraseña..." style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:3px;padding:8px 10px;color:var(--text-primary);font-size:0.85rem" autocomplete="off">
        </div>
        <div id="authError" class="text-sm" style="color:var(--red);display:none;margin-bottom:8px">Contraseña incorrecta</div>
        <div id="durationPicker" style="display:none">
          <label class="text-sm text-muted block mb-1">Duración de la sesión:</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="wow-btn wow-btn-sm" data-duration="10min">10 min</button>
            <button class="wow-btn wow-btn-sm" data-duration="1hora">1 hora</button>
            <button class="wow-btn wow-btn-sm" data-duration="8horas">8 horas</button>
            <button class="wow-btn wow-btn-sm" data-duration="1semana">1 semana</button>
            <button class="wow-btn wow-btn-sm wow-btn-primary" data-duration="siempre">Siempre</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="wow-btn" onclick="document.getElementById('authModal').classList.remove('open')">Cancelar</button>
        <button class="wow-btn wow-btn-primary" id="enterBtn">Entrar</button>
      </div>
    </div>
  </div>

  <script src="js/seed.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      const trigger = document.getElementById('loginTrigger');
      const modal = document.getElementById('authModal');
      const passwordInput = document.getElementById('passwordInput');
      const authError = document.getElementById('authError');
      const durationPicker = document.getElementById('durationPicker');
      const enterBtn = document.getElementById('enterBtn');

      let verifiedPassword = false;

      const base = document.querySelector('base')?.href || '/';
      const seguimientoUrl = base.endsWith('/') ? base + 'seguimiento/' : base + '/seguimiento/';

      if (AUTH.hasValidSession()) {
        window.location.href = seguimientoUrl;
        return;
      }

      trigger.addEventListener('dblclick', function() {
        modal.classList.add('open');
        passwordInput.value = '';
        authError.style.display = 'none';
        durationPicker.style.display = 'none';
        verifiedPassword = false;
        setTimeout(() => passwordInput.focus(), 100);
      });

      function handlePassword() {
        const input = passwordInput.value;
        if (AUTH.verifyPassword(input)) {
          verifiedPassword = true;
          authError.style.display = 'none';
          durationPicker.style.display = 'block';
          passwordInput.style.display = 'none';
          enterBtn.style.display = 'none';
          document.querySelector('.modal-footer').style.display = 'none';
        } else {
          authError.style.display = 'block';
        }
      }

      passwordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handlePassword();
      });

      enterBtn.addEventListener('click', handlePassword);

      document.querySelectorAll('[data-duration]').forEach(btn => {
        btn.addEventListener('click', function() {
          const duration = this.dataset.duration;
          const ms = AUTH.DURATIONS[duration];
          AUTH.saveSession(ms);
          window.location.href = seguimientoUrl;
        });
      });
    })();
  </script>
</body>
</html>
