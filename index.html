<!DOCTYPE html>
<html lang="es" data-theme="dark" data-size="medium">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoW Seg — Warband Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/wow.css">
  <script>
    (function() {
      var theme = localStorage.getItem('wowseg_theme') || 'dark';
      var size = localStorage.getItem('wowseg_fontsize') || 'medium';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-size', size);
    })();
  </script>
  <style>
    .landing-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(200, 150, 12, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 80%, rgba(0, 0, 0, 0.5) 0%, transparent 50%);
    }

    .landing-logo {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(200, 150, 12, 0.3), 0 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .landing-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .landing-stats {
      display: flex;
      gap: 32px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .landing-stat { text-align: center; }

    .landing-stat-value {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
    }

    .landing-stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .landing-prompt {
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: default;
      user-select: none;
      padding: 20px 40px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .landing-prompt:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
      box-shadow: 0 0 20px rgba(200, 150, 12, 0.1);
      text-shadow: 0 0 8px rgba(200, 150, 12, 0.15);
    }

    .landing-footer {
      margin-top: 60px;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- ===== LANDING (sin sesion) ===== -->
  <div id="landingSection">
    <div class="landing-container">
      <div class="landing-logo">WoW Seg</div>
      <div class="landing-subtitle">Warband Tracker</div>

      <div class="landing-stats">
        <div class="landing-stat">
          <div class="landing-stat-value">44</div>
          <div class="landing-stat-label">Personajes</div>
        </div>
        <div class="landing-stat">
          <div class="landing-stat-value">9</div>
          <div class="landing-stat-label">Warbands</div>
        </div>
        <div class="landing-stat">
          <div class="landing-stat-value">27</div>
          <div class="landing-stat-label">Activos</div>
        </div>
      </div>

      <div class="landing-prompt" id="loginTrigger">
        <span style="font-size:1.2rem">🐉</span>
        <p style="margin-top:8px;font-style:italic">"Haz doble clic para entrar..."</p>
      </div>

      <div class="landing-footer">v1.0 — gusfraba + día</div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
      <div class="modal-content" style="position:relative">
        <div class="modal-header">
          <h3>🔐 Acceso</h3>
          <button class="modal-close" onclick="document.getElementById('authModal').classList.remove('open')">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="passwordInput" placeholder="Contraseña..." style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:3px;padding:14px 16px;color:var(--text-primary);font-size:1.1rem" autocomplete="off">
          </div>
          <div id="authError" style="color:var(--red);display:none;margin-bottom:8px;font-size:0.85rem">Contraseña incorrecta</div>
          <div id="authSuccess" style="color:var(--green);display:none;margin-bottom:12px;font-size:0.9rem">✓ Contraseña correcta — Elegí la duración de sesión:</div>
          <div id="durationPicker" style="display:none">
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
              <button class="wow-btn" data-duration="10min">10 min</button>
              <button class="wow-btn" data-duration="1hora">1 hora</button>
              <button class="wow-btn" data-duration="8horas">8 horas</button>
              <button class="wow-btn" data-duration="1semana">1 semana</button>
              <button class="wow-btn wow-btn-primary" data-duration="siempre">Siempre</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="wow-btn" onclick="document.getElementById('authModal').classList.remove('open')">Cancelar</button>
          <button class="wow-btn wow-btn-primary" id="enterBtn">Entrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TRACKER (con sesion) ===== -->
  <div id="trackerSection" style="display:none">
    <header class="main-header">
      <div class="app-container">
        <div class="header-left">
          <div>
            <div class="header-logo">WoW Seg</div>
            <div class="header-subtitle">Warband Tracker</div>
          </div>
        </div>
        <div class="header-actions">
          <div class="stats-bar" id="headerStats"></div>
          <button class="wow-btn wow-btn-sm" onclick="UI.resetAllDailies()" title="Resetear tareas diarias">🔄 Reset Dailies</button>
          <button class="wow-btn wow-btn-sm" onclick="UI.showExportModal()" title="Exportar datos">📤 Export</button>
          <button class="wow-btn wow-btn-sm" onclick="UI.showImportModal()" title="Importar datos">📥 Import</button>
          <button class="wow-btn wow-btn-sm" onclick="UI.showGistModal()" title="Configurar Gist">☁️ Gist</button>
          <button class="wow-btn wow-btn-sm" onclick="UI.showManageWarbandsModal()" title="Administrar warbands">📂 Warbands</button>
          <span class="gist-status" id="gistStatus">Gist: desactivado</span>
          <button class="wow-btn wow-btn-sm wow-btn-danger" onclick="UI.logout()" title="Cerrar sesión">🚪 Salir</button>
          <select class="font-size-select" onchange="setFontSize(this.value)" title="Tamaño de letra">
            <option value="small">S</option>
            <option value="medium" selected>M</option>
            <option value="large">L</option>
            <option value="xlarge">XL</option>
          </select>
          <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
            <span class="theme-toggle__icon"></span>
            <span class="theme-toggle__label" id="themeLabel">Oscuro</span>
          </button>
        </div>
      </div>
    </header>

    <div class="app-container" style="padding-top:12px;padding-bottom:40px">
      <div class="warband-tabs" id="viewTabs"></div>
      <div class="warband-tabs" id="warbandTabs" style="margin-top:4px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px" id="warbandLayout">
        <div id="warbandPanel"></div>
        <div id="charDetail"></div>
      </div>
      <div id="dashboardPanel" style="display:none"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)UI.closeModal()"></div>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="UI.handleImportFile()">
  </div>

  <script src="js/seed.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script src="js/data.js?v=3"></script>
  <script src="js/gist.js?v=3"></script>
  <script src="js/ui.js?v=3"></script>
  <script>
    (function() {
      const landingSection = document.getElementById('landingSection');
      const trackerSection = document.getElementById('trackerSection');
      const trigger = document.getElementById('loginTrigger');
      const modal = document.getElementById('authModal');
      const passwordInput = document.getElementById('passwordInput');
      const authError = document.getElementById('authError');
      const authSuccess = document.getElementById('authSuccess');
      const durationPicker = document.getElementById('durationPicker');
      const enterBtn = document.getElementById('enterBtn');

      function syncUI() {
        var size = localStorage.getItem('wowseg_fontsize') || 'medium';
        var sel = document.querySelector('.font-size-select');
        if (sel) sel.value = size;
        var theme = localStorage.getItem('wowseg_theme') || 'dark';
        var label = document.getElementById('themeLabel');
        if (label) label.textContent = theme === 'dark' ? 'Oscuro' : 'Claro';
      }

      function showTracker() {
        landingSection.style.display = 'none';
        trackerSection.style.display = 'block';
        syncUI();
        GIST.init({
          onStatus: function(msg, tone) {
            const el = document.getElementById('gistStatus');
            if (!el) return;
            el.textContent = msg;
            el.className = 'gist-status ' + (tone === 'ok' ? 'ok' : tone === 'warn' ? 'warn' : tone === 'error' ? 'error' : tone === 'syncing' ? 'syncing' : '');
          }
        });
        UI.render();
      }

      if (AUTH.hasValidSession()) {
        showTracker();
        return;
      }

      trigger.addEventListener('dblclick', function() {
        modal.classList.add('open');
        passwordInput.value = '';
        authError.style.display = 'none';
        authSuccess.style.display = 'none';
        durationPicker.style.display = 'none';
        passwordInput.style.display = 'block';
        enterBtn.style.display = 'inline-flex';
        document.querySelector('#authModal .modal-footer').style.display = 'flex';
        setTimeout(() => passwordInput.focus(), 100);
      });

      function handlePassword() {
        const input = passwordInput.value;
        if (AUTH.verifyPassword(input)) {
          authError.style.display = 'none';
          authSuccess.style.display = 'block';
          durationPicker.style.display = 'block';
          passwordInput.style.display = 'none';
          enterBtn.style.display = 'none';
          document.querySelector('#authModal .modal-footer').style.display = 'none';
        } else {
          authError.style.display = 'block';
          authSuccess.style.display = 'none';
        }
      }

      passwordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handlePassword();
      });

      enterBtn.addEventListener('click', handlePassword);

      document.querySelectorAll('[data-duration]').forEach(btn => {
        btn.addEventListener('click', function() {
          const duration = this.dataset.duration;
          const ms = AUTH.DURATIONS[duration];
          AUTH.saveSession(ms);
          modal.classList.remove('open');
          showTracker();
        });
      });
    })();

    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('wowseg_theme', next);
      var label = document.getElementById('themeLabel');
      if (label) label.textContent = next === 'dark' ? 'Oscuro' : 'Claro';
    }

    function setFontSize(val) {
      document.documentElement.setAttribute('data-size', val);
      localStorage.setItem('wowseg_fontsize', val);
    }
  </script>
</body>
</html>
